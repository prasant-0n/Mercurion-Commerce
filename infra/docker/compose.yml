name: mercurion-local

services:
  postgres:
    image: postgres:16-alpine
    container_name: mercurion-postgres
    environment:
      POSTGRES_DB: ecommerce_platform
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_platform"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:8.0
    container_name: mercurion-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh --quiet --eval "db.adminCommand(''ping'').ok" || exit 1'
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-init-replica:
    image: mongo:8.0
    depends_on:
      mongo:
        condition: service_healthy
    entrypoint:
      - bash
      - -lc
      - |
        mongosh --host mongo:27017 --quiet <<'EOF'
        try {
          rs.status();
        } catch (error) {
          rs.initiate({
            _id: "rs0",
            members: [{ _id: 0, host: "mongo:27017" }]
          });
        }
        EOF
    restart: "no"

  redis:
    image: redis:7.4-alpine
    container_name: mercurion-redis
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: mercurion-rabbitmq
    environment:
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_USER: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: mercurion-opensearch
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s > /dev/null || exit 1"
        ]
      interval: 20s
      timeout: 10s
      retries: 10
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

volumes:
  mongo_data:
  opensearch_data:
  postgres_data:
  rabbitmq_data:
  redis_data:
